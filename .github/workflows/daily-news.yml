name: Daily News Digest

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Costa Rica is UTC-6 year-round, so 06:30 in Costa Rica = 12:30 UTC
    - cron: "30 12 * * *"
  workflow_dispatch: # Allow manual runs from the Actions tab

jobs:
  send-news:
    name: Fetch & Email News
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news agent
        env:
          EMAIL_SENDER:    ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:  ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          # Optional – change to "en" for English sources
          NEWS_LANGUAGE:   ${{ vars.NEWS_LANGUAGE || 'es' }}
          # Optional – articles inspected per source before filtering (default 20)
          MAX_ARTICLES:    ${{ vars.MAX_ARTICLES || '20' }}
          # Optional – per-topic limits per region
          MAX_TECHNOLOGY:  ${{ vars.MAX_TECHNOLOGY || '10' }}
          MAX_SCIENCE:     ${{ vars.MAX_SCIENCE || '6' }}
          MAX_POLITICS:    ${{ vars.MAX_POLITICS || '4' }}
        run: python scripts/news_agent.py
